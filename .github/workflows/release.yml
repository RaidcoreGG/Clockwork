name: Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Generate single header
        run: |
          mkdir -p dist
          python scripts/amalgamate.py

      - name: Create GitHub Release + upload asset
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          TAG="${GITHUB_REF_NAME}"

          # Create release (or update if it exists)
          gh release create "$TAG" \
            "dist/Clockwork.hpp" \
            --title "$TAG" \
            --generate-notes